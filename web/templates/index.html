<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .short-url {
            font-weight: 600;
            word-break: break-all;
        }

        .analytics-section {
            margin-top: 30px;
        }

        .analytics-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .analytics-controls input {
            flex: 1;
        }

        select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            background: white;
            cursor: pointer;
        }

        .analytics-result {
            margin-top: 20px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .stat-header {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .stat-item {
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .click-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: white;
            margin-bottom: 5px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            color: #667eea;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 URL Shortener</h1>

        <!-- Create Short URL -->
        <div class="card">
            <h2>Create Short URL</h2>
            <div class="form-group">
                <label for="originalUrl">Original URL:</label>
                <input type="text" id="originalUrl" placeholder="https://example.com/very/long/url">
            </div>
            <button onclick="createShortUrl()">Shorten URL</button>
            <div id="createResult" class="result"></div>
        </div>

        <!-- Analytics -->
        <div class="card analytics-section">
            <h2>📊 Analytics</h2>
            <div class="analytics-controls">
                <input type="text" id="analyticsUrl" placeholder="Enter short code (e.g., abc)">
                <select id="groupBy">
                    <option value="">All Clicks</option>
                    <option value="day">By Day</option>
                    <option value="month">By Month</option>
                    <option value="user_agent">By User Agent</option>
                </select>
                <button onclick="getAnalytics()">Get Analytics</button>
            </div>
            <div id="analyticsResult" class="analytics-result"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:4052/api/v1';

        async function createShortUrl() {
            const originalUrl = document.getElementById('originalUrl').value;
            const resultDiv = document.getElementById('createResult');

            if (!originalUrl) {
                showResult(resultDiv, 'Please enter a URL', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/shorten`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ original_url: originalUrl })
                });

                const data = await response.json();

                if (response.ok) {
                    showResult(resultDiv, `
                        <div>✅ Short URL created!</div>
                        <div class="short-url">Short URL: ${data.short_url}</div>
                        <div style="margin-top: 10px;">
                            <a href="${API_URL}/s/${data.short_url}" target="_blank">
                                Test Link: ${API_URL}/s/${data.short_url}
                            </a>
                        </div>
                    `, 'success');
                } else {
                    showResult(resultDiv, `❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showResult(resultDiv, `❌ Error: ${error.message}`, 'error');
            }
        }

        async function getAnalytics() {
            const shortUrl = document.getElementById('analyticsUrl').value;
            const groupBy = document.getElementById('groupBy').value;
            const resultDiv = document.getElementById('analyticsResult');

            if (!shortUrl) {
                resultDiv.innerHTML = '<div class="result error">Please enter a short code</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">Loading...</div>';

            try {
                let url = `${API_URL}/analytics/${shortUrl}`;
                if (groupBy) {
                    url += `?group_by=${groupBy}`;
                }

                const response = await fetch(url);
                const data = await response.json();

                if (response.ok) {
                    displayAnalytics(data, groupBy);
                } else {
                    resultDiv.innerHTML = `<div class="result error">❌ Error: ${data.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">❌ Error: ${error.message}</div>`;
            }
        }

        function displayAnalytics(data, groupBy) {
            const resultDiv = document.getElementById('analyticsResult');
            let html = `
                <div class="stat-card">
                    <div class="stat-header">Total Clicks: ${data.total_clicks}</div>
                </div>
            `;

            if (groupBy === 'day' && data.by_day) {
                html += '<div class="stat-card"><div class="stat-header">Clicks by Day</div>';
                data.by_day.forEach(stat => {
                    html += `<div class="stat-item">${stat.date}: <strong>${stat.clicks} clicks</strong></div>`;
                });
                html += '</div>';
            } else if (groupBy === 'month' && data.by_month) {
                html += '<div class="stat-card"><div class="stat-header">Clicks by Month</div>';
                data.by_month.forEach(stat => {
                    html += `<div class="stat-item">${stat.month}: <strong>${stat.clicks} clicks</strong></div>`;
                });
                html += '</div>';
            } else if (groupBy === 'user_agent' && data.by_user_agent) {
                html += '<div class="stat-card"><div class="stat-header">Clicks by User Agent</div>';
                data.by_user_agent.forEach(stat => {
                    html += `<div class="stat-item">${stat.user_agent}: <strong>${stat.clicks} clicks</strong></div>`;
                });
                html += '</div>';
            } else if (data.clicks) {
                html += '<div class="stat-card"><div class="stat-header">Recent Clicks</div>';
                data.clicks.slice(0, 10).forEach(click => {
                    html += `
                        <div class="click-item">
                            <div>${new Date(click.clicked_at).toLocaleString()}</div>
                            <div>${click.user_agent.substring(0, 50)}...</div>
                        </div>
                    `;
                });
                html += '</div>';
            }

            resultDiv.innerHTML = html;
        }

        function showResult(element, message, type) {
            element.innerHTML = message;
            element.className = `result ${type}`;
            element.style.display = 'block';
        }

        // Enter key support
        document.getElementById('originalUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') createShortUrl();
        });

        document.getElementById('analyticsUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') getAnalytics();
        });
    </script>
</body>
</html>
